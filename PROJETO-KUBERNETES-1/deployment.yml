# ==============================================================================
# MANIFESTO KUBERNETES - DEPLOYMENTS & STORAGE
# Projeto 1: Deploy de Aplicação Distribuída (DIO)
# ==============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  labels:
    app: mysql
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi  # Armazenamento reservado para o banco de dados
---
# ------------------------------------------------------------------------------
# DEPLOYMENT: BANCO DE DADOS (MYSQL)
# ------------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-deployment
  labels:
    app: mysql
spec:
  replicas: 1  # Bancos relacionais simples mantêm 1 réplica para consistência de dados
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql-container
          # Imagem customizada contendo a estrutura inicial da tabela sql.sql
          # ATENÇÃO: Substitua 'seu-usuario-dockerhub' pelo seu usuário real do Docker Hub
          image: seu-usuario-dockerhub/projeto-database:1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 3306
              name: mysqlport
          env:
            # Variáveis obrigatórias para inicialização do container do MySQL
            - name: MYSQL_ROOT_PASSWORD
              value: "senha_root_123"
            - name: MYSQL_DATABASE
              value: "meubanco"
            - name: MYSQL_USER
              value: "user_app"
            - name: MYSQL_PASSWORD
              value: "senha_app_123"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            # Garante a persistência dos dados acoplando o PVC ao diretório do MySQL
            - name: mysql-persistent-storage
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-persistent-storage
          persistentVolumeClaim:
            claimName: mysql-pvc
---
# ------------------------------------------------------------------------------
# DEPLOYMENT: BACKEND (PHP APACHE)
# ------------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 3  # Distribuição entre múltiplos nós para Alta Disponibilidade (HA)
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          # Imagem customizada contendo o backend PHP + extensões PDO instaladas
          # ATENÇÃO: Substitua 'seu-usuario-dockerhub' pelo seu usuário real do Docker Hub
          image: seu-usuario-dockerhub/projeto-backend:1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: httpport
          env:
            # Variáveis para a aplicação se conectar ao banco de dados pelo DNS interno do cluster
            - name: DB_HOST
              value: "mysql-service"  # Aponta para o ClusterIP estável do MySQL
            - name: DB_NAME
              value: "meubanco"
            - name: DB_USER
              value: "user_app"
            - name: DB_PASSWORD
              value: "senha_app_123"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
