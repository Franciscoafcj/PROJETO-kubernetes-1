# ==============================================================================
# DEPLOYMENT & SERVICE - Aplicação PHP (Frontend + Backend)
# Teste VHL Sistemas
#
# Estratégia: Usamos a imagem oficial php:8.1-apache e injetamos o código
# via ConfigMap. Assim não precisamos buildar/pushear imagens customizadas.
# O container roda um initContainer para instalar a extensão pdo_mysql.
# ==============================================================================

# ConfigMap com o código PHP do Backend
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-code
  labels:
    app: app-web
data:
  conexao.php: |
    <?php
    $host = getenv('DB_HOST') ?: 'mysql-service';
    $dbname = getenv('DB_NAME') ?: 'meubanco';
    $user = getenv('DB_USER') ?: 'user_app';
    $password = getenv('DB_PASSWORD') ?: 'Senha@App456';

    try {
        $pdo = new PDO("mysql:host=$host;dbname=$dbname;charset=utf8mb4", $user, $password);
        $pdo->setAttribute(PDO::ATTR_ERRMODE, PDO::ERRMODE_EXCEPTION);
        $pdo->setAttribute(PDO::ATTR_DEFAULT_FETCH_MODE, PDO::FETCH_ASSOC);
    } catch (PDOException $e) {
        header('Content-Type: application/json; charset=utf-8', true, 500);
        echo json_encode(["status" => "error", "message" => $e->getMessage()]);
        exit;
    }
    ?>

  index.php: |
    <?php
    header("Access-Control-Allow-Origin: *");
    header("Access-Control-Allow-Headers: Content-Type");
    header("Access-Control-Allow-Methods: GET, POST, OPTIONS");
    header("Content-Type: application/json; charset=utf-8");

    if ($_SERVER['REQUEST_METHOD'] === 'OPTIONS') { http_response_code(200); exit; }

    require_once 'conexao.php';

    $method = $_SERVER['REQUEST_METHOD'];

    if ($method === 'GET') {
        try {
            $stmt = $pdo->query("SELECT id, nome, email, comentario, created_at FROM mensagens ORDER BY id DESC");
            echo json_encode($stmt->fetchAll());
        } catch (PDOException $e) {
            http_response_code(500);
            echo json_encode(["status" => "error", "message" => $e->getMessage()]);
        }
    } elseif ($method === 'POST') {
        $input = json_decode(file_get_contents('php://input'), true) ?: $_POST;
        $nome = trim($input['nome'] ?? '');
        $email = trim($input['email'] ?? '');
        $comentario = trim($input['comentario'] ?? '');

        if (empty($nome) || empty($email) || empty($comentario)) {
            http_response_code(400);
            echo json_encode(["status" => "error", "message" => "Campos obrigatorios."]);
            exit;
        }

        try {
            $stmt = $pdo->prepare("INSERT INTO mensagens (nome, email, comentario) VALUES (:n, :e, :c)");
            $stmt->execute([':n' => $nome, ':e' => $email, ':c' => $comentario]);
            http_response_code(201);
            echo json_encode(["status" => "success", "message" => "Comentario salvo!"]);
        } catch (PDOException $e) {
            http_response_code(500);
            echo json_encode(["status" => "error", "message" => $e->getMessage()]);
        }
    } else {
        http_response_code(405);
        echo json_encode(["status" => "error", "message" => "Metodo nao permitido."]);
    }
    ?>

  index.html: |
    <!DOCTYPE html>
    <html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Portal de Feedback - VHL Sistemas</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
        <style>
          :root{--bg:#0a0c10;--card:rgba(255,255,255,.02);--border:rgba(255,255,255,.08);--text:#f8fafc;--muted:#94a3b8;--grad:linear-gradient(135deg,#38bdf8,#818cf8);--blue:#0ea5e9;--purple:#8b5cf6;--font:'Outfit',sans-serif}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;display:flex;justify-content:center;align-items:center;overflow-x:hidden;position:relative}.bg-orbs{position:absolute;width:100%;height:100%;top:0;left:0;z-index:-1;overflow:hidden;pointer-events:none}.orb{position:absolute;border-radius:50%;filter:blur(120px);opacity:.1;animation:f 25s infinite alternate ease-in-out}.orb-b{background:var(--blue);width:450px;height:450px;top:-100px;left:-150px}.orb-p{background:var(--purple);width:500px;height:500px;bottom:-150px;right:-100px;animation-delay:5s}@keyframes f{0%{transform:translate(0,0) scale(1)}to{transform:translate(80px,60px) scale(1.15)}}.container{width:100%;max-width:1100px;padding:2.5rem;display:flex;flex-direction:column;gap:2.5rem;z-index:1}header{text-align:center}.logo{display:flex;align-items:center;justify-content:center;gap:.75rem;margin-bottom:.5rem}.logo span{font-size:2.8rem;color:#38bdf8;text-shadow:0 0 15px rgba(56,189,248,.4)}header h1{font-size:2.2rem;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.subtitle{color:var(--muted);font-size:1rem;font-weight:300}.grid{display:grid;grid-template-columns:1fr 1.25fr;gap:2.5rem}@media(max-width:900px){.grid{grid-template-columns:1fr}}.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2rem;box-shadow:0 8px 32px rgba(0,0,0,.4);backdrop-filter:blur(20px);transition:transform .4s,border-color .4s}.card:hover{border-color:rgba(56,189,248,.2);transform:translateY(-2px)}.card h2{font-size:1.35rem;font-weight:600;margin-bottom:1.6rem;padding-bottom:.5rem;position:relative}.card h2::after{content:'';position:absolute;bottom:0;left:0;width:40px;height:3px;background:var(--grad);border-radius:2px}form{display:flex;flex-direction:column;gap:1.2rem}label{font-size:.8rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}input,textarea{background:rgba(10,12,16,.6);border:1px solid var(--border);border-radius:10px;padding:.8rem 1rem;color:var(--text);font-family:var(--font);font-size:.95rem;transition:border-color .25s,box-shadow .25s}input:focus,textarea:focus{outline:none;border-color:#38bdf8;box-shadow:0 0 12px rgba(56,189,248,.25)}.btn{background:var(--grad);border:none;border-radius:10px;padding:.9rem 1.5rem;color:#0a0c10;font-family:var(--font);font-weight:600;font-size:1rem;cursor:pointer;display:flex;justify-content:center;align-items:center;gap:.5rem;transition:transform .2s,box-shadow .2s;margin-top:.3rem}.btn:hover{transform:translateY(-2px);box-shadow:0 0 20px rgba(129,140,248,.4)}.card-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.6rem}.card-hdr h2{margin-bottom:0}.badge{background:rgba(56,189,248,.1);color:#38bdf8;padding:.25rem .7rem;border-radius:999px;font-size:.85rem;font-weight:600;border:1px solid rgba(56,189,248,.2)}.comments{max-height:400px;overflow-y:auto;display:flex;flex-direction:column;gap:1rem}.cmt{background:rgba(255,255,255,.015);border:1px solid rgba(255,255,255,.04);border-radius:12px;padding:1.1rem;transition:transform .3s,border-color .3s}.cmt:hover{border-color:rgba(255,255,255,.08);transform:translateX(4px)}.cmt-hdr{display:flex;justify-content:space-between;flex-wrap:wrap;gap:.4rem;margin-bottom:.5rem;font-size:.85rem}.cmt-author{font-weight:600;color:#38bdf8}.cmt-email{color:var(--muted)}.cmt-body{font-size:.95rem;line-height:1.5}.cmt-time{display:block;font-size:.72rem;color:rgba(255,255,255,.2);margin-top:.5rem;text-align:right}.loading{text-align:center;padding:2rem;color:var(--muted)}.spinner{width:28px;height:28px;border:3px solid rgba(56,189,248,.15);border-top:3px solid #38bdf8;border-radius:50%;margin:0 auto 1rem;animation:s 1s linear infinite}@keyframes s{to{transform:rotate(360deg)}}footer{text-align:center;font-size:.8rem;color:var(--muted);border-top:1px solid var(--border);padding-top:1.5rem}
        </style>
    </head>
    <body>
        <div class="bg-orbs"><div class="orb orb-b"></div><div class="orb orb-p"></div></div>
        <div class="container">
            <header>
                <div class="logo"><span>&#9784;</span><h1>Portal de Feedback</h1></div>
                <p class="subtitle">Cluster Kubernetes Local - Teste VHL Sistemas</p>
            </header>
            <main class="grid">
                <section class="card">
                    <h2>Enviar Mensagem</h2>
                    <form id="form">
                        <div><label for="nome">Nome</label><input type="text" id="nome" required placeholder="Seu nome"></div>
                        <div><label for="email">E-mail</label><input type="email" id="email" required placeholder="email@exemplo.com"></div>
                        <div><label for="comentario">Comentario</label><textarea id="comentario" required placeholder="Sua mensagem..." rows="3"></textarea></div>
                        <button type="submit" class="btn" id="btnSend"><span>Enviar</span><span>&#10148;</span></button>
                    </form>
                </section>
                <section class="card">
                    <div class="card-hdr"><h2>Mensagens</h2><span class="badge" id="count">0</span></div>
                    <div class="comments" id="list"><div class="loading"><div class="spinner"></div><p>Carregando...</p></div></div>
                </section>
            </main>
            <footer><p>&copy; 2026 - Teste Tecnico DevOps - VHL Sistemas</p></footer>
        </div>
        <script>
        const API = window.location.origin + '/index.php';
        const list = document.getElementById('list');
        const count = document.getElementById('count');
        const form = document.getElementById('form');

        function esc(s){if(!s)return '';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

        async function load(){
            list.innerHTML='<div class="loading"><div class="spinner"></div><p>Carregando...</p></div>';
            try{
                const r=await fetch(API);
                const d=await r.json();
                if(!Array.isArray(d)||d.length===0){list.innerHTML='<div class="loading"><p>Nenhuma mensagem ainda.</p></div>';count.textContent='0';return;}
                count.textContent=d.length;
                list.innerHTML='';
                d.forEach(c=>{
                    const t=c.created_at?new Date(c.created_at).toLocaleString('pt-BR'):'';
                    list.innerHTML+=`<div class="cmt"><div class="cmt-hdr"><span class="cmt-author">${esc(c.nome)}</span><span class="cmt-email">${esc(c.email)}</span></div><p class="cmt-body">${esc(c.comentario)}</p>${t?`<span class="cmt-time">${t}</span>`:''}</div>`;
                });
            }catch(e){list.innerHTML='<div class="loading"><p>Erro ao conectar.</p></div>';count.textContent='0';}
        }

        form.addEventListener('submit',async e=>{
            e.preventDefault();
            const btn=document.getElementById('btnSend');
            btn.disabled=true;btn.innerHTML='<span>Enviando...</span>';
            try{
                const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nome:document.getElementById('nome').value.trim(),email:document.getElementById('email').value.trim(),comentario:document.getElementById('comentario').value.trim()})});
                const d=await r.json();
                if(r.ok&&d.status==='success'){form.reset();load();}else{alert(d.message||'Erro');}
            }catch(e){alert('Erro de conexao.');}
            finally{btn.disabled=false;btn.innerHTML='<span>Enviar</span><span>&#10148;</span>';}
        });

        load();
        </script>
    </body>
    </html>

---
# Deployment da Aplicação
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-deployment
  labels:
    app: app-web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: app-web
  template:
    metadata:
      labels:
        app: app-web
    spec:
      containers:
        - name: app
          image: chialab/php:8.1-apache
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /index.php
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /index.html
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
          env:
            - name: DB_HOST
              value: "mysql-service"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secrets
                  key: mysql-database
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secrets
                  key: mysql-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secrets
                  key: mysql-password
          volumeMounts:
            - name: app-code
              mountPath: /var/www/html
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
      volumes:
        - name: app-code
          configMap:
            name: app-code
---
# Service NodePort para acesso externo pela máquina host
apiVersion: v1
kind: Service
metadata:
  name: app-service
  labels:
    app: app-web
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30001  # Acessível via http://192.168.56.10:30001
  selector:
    app: app-web
