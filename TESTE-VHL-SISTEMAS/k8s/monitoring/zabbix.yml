# ==============================================================================
# ZABBIX APPLIANCE - Monitoramento do Cluster K8s (Item Complementar)
# Teste VHL Sistemas
#
# O Zabbix Appliance consolida o Zabbix Server, Frontend Web e banco de dados
# em um único container leve, ideal para demonstrações e testes rápidos.
# ==============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zabbix-deployment
  namespace: monitoring
  labels:
    app: zabbix
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zabbix
  template:
    metadata:
      labels:
        app: zabbix
    spec:
      containers:
        - name: zabbix-appliance
          image: zabbix/zabbix-appliance:alpine-latest
          ports:
            - containerPort: 80
              name: web
            - containerPort: 10051
              name: server
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"
          # O Zabbix usa SQLite interno por padrão para o Appliance, sem necessidade de banco externo.
---
apiVersion: v1
kind: Service
metadata:
  name: zabbix-service
  namespace: monitoring
spec:
  type: NodePort
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080  # Acessível via http://192.168.56.10:30080
  selector:
    app: zabbix
