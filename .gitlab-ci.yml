stages:
  - lint
  - validate

# Lint YAML files for syntax formatting (disabling strict line-length and document-start rules)
lint-yaml:
  stage: lint
  image: alpine:latest
  before_script:
    - apk add --no-cache python3 py3-pip
    - pip3 install yamllint --break-system-packages
  script:
    - 'yamllint -d "{rules: {line-length: disable, document-start: disable}}" TESTE-VHL-SISTEMAS/k8s/'

# Dry-run validation of Kubernetes manifests (using alpine and disabling schema validation to run offline)
validate-k8s:
  stage: validate
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
    - curl -LO "https://dl.k8s.io/release/v1.28.2/bin/linux/amd64/kubectl"
    - chmod +x kubectl
    - mv kubectl /usr/local/bin/
  script:
    - kubectl apply --dry-run=client --validate=false -f TESTE-VHL-SISTEMAS/k8s/secrets.yml
    - kubectl apply --dry-run=client --validate=false -f TESTE-VHL-SISTEMAS/k8s/volumes.yml
    - kubectl apply --dry-run=client --validate=false -f TESTE-VHL-SISTEMAS/k8s/mysql.yml
    - kubectl apply --dry-run=client --validate=false -f TESTE-VHL-SISTEMAS/k8s/app.yml
